name: Content Agent

on:
  schedule:
    # Каждые 2 часа с 8:00 до 22:00 по МСК (UTC+3, значит UTC 5:00–19:00)
    - cron: '0 5 * * *'   #  8:00 МСК
    - cron: '0 7 * * *'   # 10:00 МСК
    - cron: '0 9 * * *'   # 12:00 МСК
    - cron: '0 11 * * *'  # 14:00 МСК
    - cron: '0 13 * * *'  # 16:00 МСК
    - cron: '0 15 * * *'  # 18:00 МСК
    - cron: '0 17 * * *'  # 20:00 МСК
    - cron: '0 19 * * *'  # 22:00 МСК

  # Ручной запуск для теста
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run agent
        env:
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID:    ${{ secrets.TELEGRAM_CHANNEL_ID }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID:     ${{ secrets.PINTEREST_BOARD_ID }}
        run: python main.py
